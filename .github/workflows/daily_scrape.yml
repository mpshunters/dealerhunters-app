name: Daily Dealer Signal Scrape

on:
  workflow_dispatch:
  schedule:
    - cron: "0 13 * * *"

jobs:
  scrape:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run dealer scraper
        run: python scripts/scrape_dealer_signals.py
