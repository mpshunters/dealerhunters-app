name: Keep Workflows Active

on:
  # schedule:
  #   - cron: "0 12 * * *"  # disabled — CF Worker now triggers daily_scrape.yml
  workflow_dispatch:

permissions:
  actions: write
  contents: read

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger main pipeline if needed
        run: |
          echo "Keepalive check $(date)"
          gh workflow run daily_scrape.yml --ref main
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
