name: Keep Workflows Active

on:
  schedule:
    - cron: "0 12 * * *"  # 7am Central — fires after both 11:17 and 11:47 UTC windows
  workflow_dispatch:

jobs:
  keepalive:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Trigger main pipeline if needed
        run: |
          echo "Keepalive check $(date)"
          gh workflow run daily_scrape.yml
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
