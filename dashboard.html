<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealerHunters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F9FAFB;
      color: #1A1F36;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #111827;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #10B981;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo-wordmark { display: flex; flex-direction: column; gap: 3px; }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo-name .dealer  { color: #ffffff; }
    .logo-name .hunters { color: #10B981; }

    .logo-tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.42);
      font-weight: 400;
      letter-spacing: 0.15px;
    }

    .header-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.38);
    }

    .header-meta strong {
      color: rgba(255,255,255,0.60);
      font-weight: 500;
    }

    /* ── Filter bar ── */
    .filter-bar-wrap {
      background: #ffffff;
      border-bottom: 1px solid #E8ECF4;
      position: sticky;
      top: 0;
      z-index: 100;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .filter-bar {
      max-width: 900px;
      margin: 0 auto;
      padding: 11px 16px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    .filter-pills {
      display: flex;
      align-items: center;
      gap: 6px;
      flex-wrap: wrap;
      flex: 1;
    }

    .filter-pill {
      background: transparent;
      border: 1.5px solid #E5E7EB;
      color: #6B7280;
      padding: 5px 13px;
      border-radius: 999px;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s ease;
      white-space: nowrap;
      line-height: 1.4;
    }

    .filter-pill:hover {
      border-color: #10B981;
      color: #10B981;
    }

    .filter-pill.active {
      background: #10B981;
      border-color: #10B981;
      color: #ffffff;
    }

    .filter-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }

    .search-wrap { position: relative; }

    .search-wrap .search-icon {
      position: absolute;
      left: 9px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
    }

    .search-input {
      border: 1.5px solid #E5E7EB;
      border-radius: 8px;
      padding: 6px 10px 6px 30px;
      font-size: 13px;
      color: #1A1F36;
      outline: none;
      font-family: inherit;
      transition: border-color 0.15s ease, background 0.15s ease;
      width: 200px;
      background: #F9FAFB;
    }

    .search-input:focus {
      border-color: #10B981;
      background: #ffffff;
    }

    .search-input::placeholder { color: #9CA3AF; }

    .results-meta {
      font-size: 12.5px;
      color: #9CA3AF;
      white-space: nowrap;
      min-width: 120px;
      text-align: right;
    }

    .results-meta strong { color: #374151; font-weight: 600; }

    /* ── Main ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 24px 16px 64px;
    }

    /* ── Stats grid ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      gap: 10px;
      margin-bottom: 22px;
    }

    @media (max-width: 800px) { .stats-grid { grid-template-columns: repeat(3, 1fr); } }
    @media (max-width: 460px) { .stats-grid { grid-template-columns: repeat(2, 1fr); } }

    .stat-card {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-radius: 10px;
      padding: 14px 16px 13px;
      box-shadow: 0 1px 6px rgba(0,0,0,0.05);
    }

    .stat-value {
      font-size: 26px;
      font-weight: 800;
      color: #111827;
      line-height: 1;
      margin-bottom: 5px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 500;
      color: #9CA3AF;
      letter-spacing: 0.2px;
    }

    .stat-card.green .stat-value { color: #10B981; }
    .stat-card.blue  .stat-value { color: #3B82F6; }

    /* ── Skeleton ── */
    @keyframes shimmer {
      0%   { background-position: -600px 0; }
      100% { background-position:  600px 0; }
    }

    .skel {
      background: linear-gradient(90deg, #F3F4F6 25%, #E9EAEC 50%, #F3F4F6 75%);
      background-size: 600px 100%;
      animation: shimmer 1.5s ease-in-out infinite;
      border-radius: 6px;
    }

    .skeleton-card {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-top: 3px solid #E8ECF4;
      border-radius: 12px;
      padding: 20px 22px 18px;
      margin-bottom: 14px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.04);
    }

    .skel-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 14px;
    }

    /* ── Cards ── */
    @keyframes cardIn {
      from { opacity: 0; transform: translateY(14px); }
      to   { opacity: 1; transform: translateY(0);    }
    }

    .card {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-top: 3px solid #10B981;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 14px;
      padding: 20px 22px 18px;
      animation: cardIn 0.4s ease-out both;
      transition: box-shadow 0.2s ease, transform 0.2s ease;
    }

    .card:hover {
      box-shadow: 0 8px 28px rgba(0,0,0,0.10);
      transform: translateY(-2px);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 12px;
    }

    .card-identity { flex: 1; min-width: 0; }

    .card-name-row {
      display: flex;
      align-items: center;
      gap: 7px;
      flex-wrap: wrap;
    }

    .dealer-name {
      font-size: 18px;
      font-weight: 700;
      color: #1A1F36;
      line-height: 1.25;
    }

    .new-badge {
      display: inline-block;
      background: #ECFDF5;
      color: #059669;
      font-size: 10px;
      font-weight: 700;
      padding: 2px 7px;
      border-radius: 999px;
      letter-spacing: 0.4px;
      flex-shrink: 0;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #9CA3AF;
      font-size: 13px;
      margin-top: 5px;
    }

    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    .summary {
      font-size: 14px;
      line-height: 1.65;
      color: #374151;
      margin-bottom: 14px;
    }

    .pitch-box {
      border-left: 3px solid #10B981;
      background: #F0FDF9;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
    }

    .pitch-label {
      font-size: 11px;
      font-weight: 500;
      color: #9CA3AF;
      margin-bottom: 3px;
    }

    .pitch-text {
      font-size: 13.5px;
      font-weight: 500;
      color: #1A1F36;
      line-height: 1.5;
    }

    .card-footer {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .source-link {
      font-size: 12px;
      color: #9CA3AF;
      text-decoration: none;
      font-weight: 500;
      transition: color 0.15s ease;
    }

    .source-link:hover { color: #10B981; }

    .card-footer-right {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .btn-find-contact {
      background: transparent;
      color: #10B981;
      border: 1.5px solid #10B981;
      padding: 7px 14px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      text-decoration: none;
      display: inline-block;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease;
    }

    .btn-find-contact:hover {
      background: #10B981;
      color: #ffffff;
    }

    .btn-contact {
      background: transparent;
      color: #6B7280;
      border: 1.5px solid #D1D5DB;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .btn-contact:hover:not(:disabled) {
      border-color: #6B7280;
      color: #374151;
    }

    /* ── Empty filter state ── */
    .empty-filter {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-radius: 12px;
      padding: 56px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.05);
    }

    .empty-icon {
      width: 48px;
      height: 48px;
      margin: 0 auto 16px;
      background: #F3F4F6;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .empty-filter h3 {
      font-size: 16px;
      font-weight: 600;
      color: #374151;
      margin-bottom: 6px;
    }

    .empty-filter p {
      font-size: 14px;
      color: #9CA3AF;
    }

    /* ── Error / no-data states ── */
    .state-card {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      color: #6B7280;
      font-size: 15px;
    }

    .state-card.error { color: #991B1B; }

    /* ── Outreach tracker ── */
    .outreach-tracker {
      border-top: 1px solid #E8ECF4;
      margin-top: 14px;
      padding-top: 14px;
    }

    .outreach-tracker-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 8px;
    }

    .outreach-tracker-label {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: #9CA3AF;
    }

    .outreach-progress {
      font-size: 11px;
      font-weight: 600;
      color: #9CA3AF;
      transition: color 0.2s ease;
    }

    .outreach-progress.complete { color: #10B981; }

    .outreach-steps-list {
      display: flex;
      flex-direction: column;
      gap: 2px;
    }

    .outreach-step {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 5px 0;
      cursor: pointer;
      user-select: none;
    }

    .outreach-step input[type="checkbox"] {
      accent-color: #10B981;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .outreach-step-label {
      font-size: 13px;
      color: #374151;
      transition: color 0.15s ease;
      line-height: 1.3;
    }

    .outreach-step input:checked ~ .outreach-step-label {
      color: #9CA3AF;
      text-decoration: line-through;
      text-decoration-color: #D1D5DB;
    }

    /* ── Settings gear ── */
    .header-right {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .settings-wrap { position: relative; }

    .settings-btn {
      display: flex;
      align-items: center;
      gap: 6px;
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 7px;
      padding: 5px 10px;
      color: rgba(255,255,255,0.45);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      transition: color 0.15s ease, background 0.15s ease, border-color 0.15s ease;
      white-space: nowrap;
    }

    .settings-btn:hover {
      color: rgba(255,255,255,0.85);
      background: rgba(255,255,255,0.06);
      border-color: rgba(255,255,255,0.2);
    }

    .settings-btn .gear-icon { font-size: 13px; }

    #platform-name-label {
      font-size: 11px;
      color: rgba(255,255,255,0.32);
      font-weight: 400;
    }

    .settings-dropdown {
      position: absolute;
      right: 0;
      top: calc(100% + 8px);
      background: #1F2937;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 10px;
      min-width: 210px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.45);
      z-index: 500;
      opacity: 0;
      transform: translateY(-6px);
      pointer-events: none;
      transition: opacity 0.15s ease, transform 0.15s ease;
    }

    .settings-dropdown.open {
      opacity: 1;
      transform: translateY(0);
      pointer-events: auto;
    }

    .settings-dropdown-title {
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 1.2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      padding: 12px 14px 10px;
      border-bottom: 1px solid rgba(255,255,255,0.07);
    }

    .platform-option {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      color: rgba(255,255,255,0.6);
      transition: background 0.12s ease, color 0.12s ease;
    }

    .platform-option:last-child { padding-bottom: 12px; }

    .platform-option:hover {
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.9);
    }

    .platform-option input[type="radio"] {
      accent-color: #10B981;
      width: 14px;
      height: 14px;
      flex-shrink: 0;
      cursor: pointer;
    }

    .platform-option.selected { color: #10B981; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <svg width="40" height="40" viewBox="0 0 40 40" fill="none" aria-hidden="true">
      <circle cx="20" cy="20" r="18" stroke="#10B981" stroke-width="1.5"/>
      <line x1="20" y1="1"  x2="20" y2="9"  stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="20" y1="31" x2="20" y2="39" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="1"  y1="20" x2="9"  y2="20" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
      <line x1="31" y1="20" x2="39" y2="20" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
      <circle cx="20" cy="20" r="2" fill="#10B981"/>
      <rect x="5" y="21" width="30" height="8" rx="1.5" stroke="#10B981" stroke-width="1.5"/>
      <path d="M9 21 L13 13 H27 L32 21" stroke="#10B981" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
      <circle cx="12.5" cy="29" r="4" stroke="#10B981" stroke-width="1.5"/>
      <circle cx="27.5" cy="29" r="4" stroke="#10B981" stroke-width="1.5"/>
    </svg>
    <div class="logo-wordmark">
      <div class="logo-name">
        <span class="dealer">Dealer</span><span class="hunters">Hunters</span>
      </div>
      <div class="logo-tagline">Dealer signals. Delivered daily.</div>
    </div>
  </div>
  <div class="header-right">
    <div class="header-meta">Last updated: <strong id="last-updated">—</strong></div>
    <div class="settings-wrap" id="settings-wrap">
      <button class="settings-btn" id="settings-btn" title="Contact platform settings">
        <span class="gear-icon">⚙</span>
        <span id="platform-name-label">Apollo.io</span>
      </button>
      <div class="settings-dropdown" id="settings-dropdown">
        <div class="settings-dropdown-title">Contact Platform</div>
        <label class="platform-option" data-platform="apollo">
          <input type="radio" name="contactPlatform" value="apollo" /> Apollo.io
        </label>
        <label class="platform-option" data-platform="zoominfo">
          <input type="radio" name="contactPlatform" value="zoominfo" /> ZoomInfo
        </label>
        <label class="platform-option" data-platform="linkedin">
          <input type="radio" name="contactPlatform" value="linkedin" /> LinkedIn Sales Navigator
        </label>
        <label class="platform-option" data-platform="hunter">
          <input type="radio" name="contactPlatform" value="hunter" /> Hunter.io
        </label>
      </div>
    </div>
  </div>
</header>

<div class="filter-bar-wrap">
  <div class="filter-bar">
    <div class="filter-pills" id="filter-pills">
      <button class="filter-pill active" data-filter="All">All</button>
      <button class="filter-pill" data-filter="Ownership Change">Ownership Change</button>
      <button class="filter-pill" data-filter="Marketing Hire">Marketing Hire</button>
      <button class="filter-pill" data-filter="Leadership Change">Leadership Change</button>
      <button class="filter-pill" data-filter="Expansion">Expansion</button>
    </div>
    <div class="filter-right">
      <div class="search-wrap">
        <svg class="search-icon" width="14" height="14" viewBox="0 0 20 20" fill="none">
          <circle cx="9" cy="9" r="7" stroke="#9CA3AF" stroke-width="1.8"/>
          <path d="M16 16l-3.5-3.5" stroke="#9CA3AF" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
        <input type="text" class="search-input" id="search-input" placeholder="Search dealerships..." autocomplete="off" />
      </div>
      <div class="results-meta" id="results-meta"></div>
    </div>
  </div>
</div>

<main class="main">
  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-value" id="stat-total">—</div>
      <div class="stat-label">Total Opportunities</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-ownership">—</div>
      <div class="stat-label">Ownership Changes</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-hiring">—</div>
      <div class="stat-label">Marketing Hires</div>
    </div>
    <div class="stat-card green">
      <div class="stat-value" id="stat-score">—</div>
      <div class="stat-label">Avg Score</div>
    </div>
    <div class="stat-card blue">
      <div class="stat-value" id="stat-contacted">0</div>
      <div class="stat-label">Contacted</div>
    </div>
    <div class="stat-card">
      <div class="stat-value" id="stat-dealerships">—</div>
      <div class="stat-label">Dealerships in DB</div>
    </div>
  </div>

  <div id="results"></div>
</main>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

/* ── Signal config ── */
const SIGNAL_CONFIG = {
  'ownership_change':  { label: 'Ownership Change',  color: '#065F46', bg: '#ECFDF5' },
  'hiring':            { label: 'Marketing Hire',    color: '#1E40AF', bg: '#EFF6FF' },
  'new_rooftop':       { label: 'New Rooftop',       color: '#166534', bg: '#F0FDF4' },
  'oem_event':         { label: 'OEM Event',         color: '#6B21A8', bg: '#FAF5FF' },
  'Ownership Change':  { label: 'Ownership Change',  color: '#065F46', bg: '#ECFDF5' },
  'Marketing Hire':    { label: 'Marketing Hire',    color: '#1E40AF', bg: '#EFF6FF' },
  'Leadership Change': { label: 'Leadership Change', color: '#6B21A8', bg: '#FAF5FF' },
  'Expansion':         { label: 'Expansion',         color: '#166534', bg: '#F0FDF4' },
};
const DEFAULT_SIGNAL = { label: 'Signal', color: '#344054', bg: '#F2F4F7' };

const OUTREACH_STEPS = [
  { key: 'ip_ad',          label: 'IP ad running' },
  { key: 'direct_mail',    label: 'Direct mail sent' },
  { key: 'linkedin',       label: 'LinkedIn connected' },
  { key: 'email_sequence', label: 'Email sequence started' },
  { key: 'phone_call',     label: 'Phone call made' },
];

const PIN_ICON = `<svg width="10" height="13" viewBox="0 0 12 15" fill="none">
  <path d="M6 0C3.51 0 1.5 2.01 1.5 4.5c0 3.375 4.5 9 4.5 9s4.5-5.625 4.5-9C10.5 2.01 8.49 0 6 0zm0 6.375A1.875 1.875 0 1 1 6 2.625a1.875 1.875 0 0 1 0 3.75z" fill="#9CA3AF"/>
</svg>`;

/* ── Contact platform ── */
const PLATFORM_LABELS = {
  apollo:   'Apollo.io',
  zoominfo: 'ZoomInfo',
  linkedin: 'LinkedIn Sales Nav',
  hunter:   'Hunter.io',
};

let contactPlatform = localStorage.getItem('contactPlatform') || 'apollo';

function getContactUrl(name, website) {
  const n = encodeURIComponent(name);
  switch (contactPlatform) {
    case 'zoominfo':
      return `https://app.zoominfo.com/insights/search/company?companyName=${n}`;
    case 'linkedin':
      return `https://www.linkedin.com/sales/search/people?keywords=${n}&titleIncluded=General%20Manager`;
    case 'hunter':
      if (website) {
        const domain = website.replace(/^https?:\/\/(www\.)?/, '').replace(/\/.*$/, '');
        return `https://hunter.io/search/${encodeURIComponent(domain)}`;
      }
      return `https://hunter.io/search/${n}`;
    case 'apollo':
    default:
      return `https://app.apollo.io/#/people?organizationName=${n}&personTitles[]=General Manager&personTitles[]=Marketing Director`;
  }
}

/* ── State ── */
let allData        = [];
let activeFilter   = 'All';
let searchQuery    = '';
let contactedCount = 0;
let totalActive    = 0;
let totalShowing   = 0;

/* ── DOM refs ── */
const resultsEl   = document.getElementById('results');
const metaEl      = document.getElementById('results-meta');
const statTotal       = document.getElementById('stat-total');
const statOwner       = document.getElementById('stat-ownership');
const statHiring      = document.getElementById('stat-hiring');
const statScore       = document.getElementById('stat-score');
const statContact     = document.getElementById('stat-contacted');
const statDealerships = document.getElementById('stat-dealerships');

/* ── Utilities ── */
function esc(s) {
  return String(s ?? '')
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function sleep(ms) { return new Promise(r => setTimeout(r, ms)); }

function getSignal(item) {
  return SIGNAL_CONFIG[item.signal_type || item.opportunity_type || ''] || DEFAULT_SIGNAL;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric',
  });
}

function getFiltered() {
  return allData.filter(item => {
    if (item.status === 'contacted') return false;
    if (activeFilter !== 'All' && getSignal(item).label !== activeFilter) return false;
    if (searchQuery && !(item.dealership_name || '').toLowerCase().includes(searchQuery)) return false;
    return true;
  });
}

function updateMeta() {
  if (totalActive === 0) { metaEl.innerHTML = ''; return; }
  metaEl.innerHTML = `<strong>${totalShowing}</strong> of <strong>${totalActive}</strong> opportunities`;
}

/* ── Count-up animation ── */
function animateCount(el, target, duration = 700) {
  const start = performance.now();
  (function tick(now) {
    const p = Math.min((now - start) / duration, 1);
    const eased = 1 - Math.pow(1 - p, 3);
    el.textContent = Math.round(eased * target);
    if (p < 1) requestAnimationFrame(tick);
  })(start);
}

/* ── Stats ── */
function updateStats(data) {
  const active = data.filter(d => d.status !== 'contacted');

  const ownerCount = active.filter(d => {
    const t = d.signal_type || d.opportunity_type || '';
    return t === 'ownership_change' || t === 'Ownership Change';
  }).length;

  const hiringCount = active.filter(d => {
    const t = d.signal_type || d.opportunity_type || '';
    return t === 'hiring' || t === 'Marketing Hire';
  }).length;

  const scores = active.map(d => Number(d.confidence_score ?? d.fit_score ?? 0)).filter(Boolean);
  const avg = scores.length ? Math.round(scores.reduce((a, b) => a + b, 0) / scores.length) : 0;

  contactedCount = data.filter(d => d.status === 'contacted').length;
  totalActive    = active.length;

  animateCount(statTotal,   active.length);
  animateCount(statOwner,   ownerCount);
  animateCount(statHiring,  hiringCount);
  animateCount(statScore,   avg);
  animateCount(statContact, contactedCount);
}

/* ── Score gauge ── */
function scoreGauge(score) {
  const s      = Math.min(Math.max(Number(score) || 0, 0), 100);
  const r      = 19;
  const circ   = +(2 * Math.PI * r).toFixed(2);
  const target = +(circ * (1 - s / 100)).toFixed(2);
  const stroke = s >= 70 ? '#10B981' : s >= 40 ? '#F59E0B' : '#D0D5DD';
  return `<svg width="54" height="54" viewBox="0 0 54 54" style="flex-shrink:0">
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="#F2F4F7" stroke-width="3.5"/>
    <circle class="gauge-progress" cx="27" cy="27" r="${r}" fill="none" stroke="${stroke}"
      stroke-width="3.5" stroke-dasharray="${circ}" stroke-dashoffset="${circ}"
      data-target="${target}" stroke-linecap="round" transform="rotate(-90 27 27)"
      style="transition:stroke-dashoffset .6s ease-out;"/>
    <text x="27" y="32" text-anchor="middle" fill="#1A1F36"
      font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700">${s}</text>
  </svg>`;
}

function triggerGauges() {
  requestAnimationFrame(() => requestAnimationFrame(() => {
    resultsEl.querySelectorAll('.gauge-progress').forEach(el => {
      el.style.strokeDashoffset = el.dataset.target;
    });
  }));
}

/* ── Skeleton loader ── */
function renderSkeletons() {
  const row = (w, h, extra = '') =>
    `<div class="skel" style="width:${w};height:${h}px;${extra}"></div>`;

  resultsEl.innerHTML = Array.from({ length: 3 }, () => `
    <div class="skeleton-card">
      <div class="skel-row">
        <div style="flex:1">
          ${row('65%', 18, 'margin-bottom:8px')}
          ${row('38%', 13)}
        </div>
        ${row('54px', 54, 'border-radius:50%;flex-shrink:0')}
      </div>
      ${row('110px', 22, 'border-radius:999px;margin-bottom:14px')}
      ${row('100%', 14, 'margin-bottom:7px')}
      ${row('88%',  14, 'margin-bottom:7px')}
      ${row('70%',  14, 'margin-bottom:16px')}
      ${row('100%', 52, 'border-radius:8px;margin-bottom:18px')}
      <div style="display:flex;justify-content:flex-end">${row('130px', 34, 'border-radius:8px')}</div>
    </div>`).join('');
}

/* ── Render cards ── */
function renderCards(data) {
  if (data.length === 0) {
    resultsEl.innerHTML = `
      <div class="empty-filter">
        <div class="empty-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none">
            <circle cx="11" cy="11" r="8" stroke="#9CA3AF" stroke-width="1.6"/>
            <path d="M21 21l-4.35-4.35" stroke="#9CA3AF" stroke-width="1.6" stroke-linecap="round"/>
          </svg>
        </div>
        <h3>No opportunities match your filters</h3>
        <p>Try adjusting your search or selecting a different signal type.</p>
      </div>`;
    totalShowing = 0;
    updateMeta();
    return;
  }

  resultsEl.innerHTML = data.map((item, i) => {
    const name     = item.dealership_name || 'Unnamed Dealership';
    const location = [item.city, item.state].filter(Boolean).join(', ') || 'Location unavailable';
    const signal   = getSignal(item);
    const score    = item.confidence_score ?? item.fit_score ?? 0;
    const summary  = item.ai_summary  || 'No summary available.';
    const pitch    = item.pitch_angle || item.recommended_offer || 'No pitch available.';
    const isNew    = item.status === 'new';
    const delay    = Math.min(i, 8) * 80;

    const srcLink = item.source_url && item.source_url.startsWith('http')
      ? `<a href="${esc(item.source_url)}" target="_blank" rel="noopener noreferrer" class="source-link">View source article →</a>`
      : '<span></span>';

    const steps    = item.outreach_steps || {};
    const doneCount = OUTREACH_STEPS.filter(s => steps[s.key]).length;
    const allDone  = doneCount === OUTREACH_STEPS.length;
    const stepsHtml = OUTREACH_STEPS.map(s => `
      <label class="outreach-step">
        <input type="checkbox" class="step-check" data-id="${item.id}" data-step="${s.key}"${steps[s.key] ? ' checked' : ''}>
        <span class="outreach-step-label">${s.label}</span>
      </label>`).join('');

    return `
      <div class="card" style="animation-delay:${delay}ms">
        <div class="card-top">
          <div class="card-identity">
            <div class="card-name-row">
              <div class="dealer-name">${esc(name)}</div>
              ${isNew ? '<span class="new-badge">NEW</span>' : ''}
            </div>
            <div class="location">${PIN_ICON} ${esc(location)}</div>
          </div>
          ${scoreGauge(score)}
        </div>
        <span class="badge" style="color:${signal.color};background:${signal.bg}">${signal.label}</span>
        <div class="summary">${esc(summary)}</div>
        <div class="pitch-box">
          <div class="pitch-label">Suggested pitch</div>
          <div class="pitch-text">${esc(pitch)}</div>
        </div>
        <div class="card-footer">
          ${srcLink}
          <div class="card-footer-right">
            <a href="${esc(getContactUrl(name, item.website || ''))}"
              target="_blank" rel="noopener noreferrer" class="btn-find-contact">Find Contact</a>
            <button class="btn-contact" data-id="${item.id}">Mark Contacted</button>
          </div>
        </div>
        <div class="outreach-tracker">
          <div class="outreach-tracker-header">
            <span class="outreach-tracker-label">Campaign Sequence</span>
            <span class="outreach-progress${allDone ? ' complete' : ''}" data-progress-id="${item.id}">${doneCount}/${OUTREACH_STEPS.length}</span>
          </div>
          <div class="outreach-steps-list">${stepsHtml}</div>
        </div>
      </div>`;
  }).join('');

  totalShowing = data.length;
  updateMeta();
  triggerGauges();
}

/* ── Mark Contacted ── */
async function markContacted(id, card, btn) {
  btn.textContent = 'Saving…';
  btn.disabled = true;
  card.style.pointerEvents = 'none';

  const { error } = await client
    .from('opportunities')
    .update({ status: 'contacted' })
    .eq('id', id);

  if (error) {
    console.error('Mark contacted error:', error);
    btn.textContent = 'Mark Contacted';
    btn.disabled = false;
    card.style.pointerEvents = '';
    return;
  }

  const item = allData.find(d => String(d.id) === String(id));
  if (item) item.status = 'contacted';

  // Green flash
  card.style.outline       = '3px solid rgba(16,185,129,0.4)';
  card.style.outlineOffset = '0px';

  await sleep(170);

  // Capture current height then transition to 0
  const h = card.offsetHeight;
  card.style.maxHeight = h + 'px';
  card.style.overflow  = 'hidden';
  card.offsetHeight; // force reflow

  card.style.transition = [
    'opacity .28s ease',
    'transform .28s ease',
    'max-height .42s ease .08s',
    'margin-bottom .42s ease .08s',
    'padding-top .42s ease .08s',
    'padding-bottom .42s ease .08s',
    'outline .2s ease',
  ].join(', ');

  card.style.opacity       = '0';
  card.style.transform     = 'translateY(-8px)';
  card.style.maxHeight     = '0';
  card.style.marginBottom  = '0';
  card.style.paddingTop    = '0';
  card.style.paddingBottom = '0';
  card.style.outline       = '0px solid transparent';

  await sleep(530);
  card.remove();

  contactedCount++;
  totalActive  = Math.max(0, totalActive  - 1);
  totalShowing = Math.max(0, totalShowing - 1);
  statContact.textContent = contactedCount;
  statTotal.textContent   = totalActive;
  updateMeta();
}

/* ── Event wiring ── */
document.getElementById('filter-pills').addEventListener('click', e => {
  const pill = e.target.closest('.filter-pill');
  if (!pill) return;
  document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
  pill.classList.add('active');
  activeFilter = pill.dataset.filter;
  renderCards(getFiltered());
});

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  renderCards(getFiltered());
});

resultsEl.addEventListener('click', e => {
  const btn = e.target.closest('.btn-contact');
  if (!btn || btn.disabled) return;
  markContacted(btn.dataset.id, btn.closest('.card'), btn);
});

resultsEl.addEventListener('change', async e => {
  const checkbox = e.target.closest('.step-check');
  if (!checkbox) return;

  const id      = checkbox.dataset.id;
  const step    = checkbox.dataset.step;
  const checked = checkbox.checked;

  const item = allData.find(d => String(d.id) === String(id));
  if (!item) return;
  if (!item.outreach_steps) item.outreach_steps = {};
  item.outreach_steps[step] = checked;

  const doneCount = OUTREACH_STEPS.filter(s => item.outreach_steps[s.key]).length;
  const allDone   = doneCount === OUTREACH_STEPS.length;
  const progressEl = document.querySelector(`.outreach-progress[data-progress-id="${id}"]`);
  if (progressEl) {
    progressEl.textContent = `${doneCount}/${OUTREACH_STEPS.length}`;
    progressEl.classList.toggle('complete', allDone);
  }

  const { error } = await client
    .from('opportunities')
    .update({ outreach_steps: item.outreach_steps })
    .eq('id', id);

  if (error) {
    console.error('Failed to save outreach step:', error);
    checkbox.checked = !checked;
    item.outreach_steps[step] = !checked;
    const revert = OUTREACH_STEPS.filter(s => item.outreach_steps[s.key]).length;
    if (progressEl) {
      progressEl.textContent = `${revert}/${OUTREACH_STEPS.length}`;
      progressEl.classList.toggle('complete', revert === OUTREACH_STEPS.length);
    }
  }
});

/* ── Settings panel ── */
(function initSettings() {
  const wrap    = document.getElementById('settings-wrap');
  const btn     = document.getElementById('settings-btn');
  const dropdown = document.getElementById('settings-dropdown');
  const nameLabel = document.getElementById('platform-name-label');

  // Sync radio + labels to stored value
  function applyPlatform(val) {
    contactPlatform = val;
    localStorage.setItem('contactPlatform', val);
    nameLabel.textContent = PLATFORM_LABELS[val] || val;

    dropdown.querySelectorAll('.platform-option').forEach(opt => {
      const selected = opt.dataset.platform === val;
      opt.classList.toggle('selected', selected);
      opt.querySelector('input').checked = selected;
    });
  }

  applyPlatform(contactPlatform);

  btn.addEventListener('click', e => {
    e.stopPropagation();
    dropdown.classList.toggle('open');
  });

  dropdown.querySelectorAll('input[type="radio"]').forEach(radio => {
    radio.addEventListener('change', () => {
      applyPlatform(radio.value);
      dropdown.classList.remove('open');
      // Re-render cards so Find Contact URLs update immediately
      if (allData.length) renderCards(getFiltered());
    });
  });

  document.addEventListener('click', e => {
    if (!wrap.contains(e.target)) dropdown.classList.remove('open');
  });
})();

/* ── Bootstrap ── */
async function loadOpportunities() {
  renderSkeletons();

  const [
    { data, error },
    { count: dealerCount },
  ] = await Promise.all([
    client.from('opportunities').select('*').order('confidence_score', { ascending: false }),
    client.from('dealerships').select('*', { count: 'exact', head: true }),
  ]);

  if (dealerCount != null) animateCount(statDealerships, dealerCount);

  if (error) {
    resultsEl.innerHTML = `<div class="state-card error">
      <strong>Could not load opportunities.</strong><br><br>${error.message}
    </div>`;
    return;
  }

  if (!data || data.length === 0) {
    resultsEl.innerHTML = `<div class="state-card">
      No opportunities yet. The pipeline populates this automatically each day.
    </div>`;
    return;
  }

  allData = data;
  updateStats(data);

  const latest = data.reduce((a, b) =>
    new Date(a.created_at) > new Date(b.created_at) ? a : b, data[0]);
  document.getElementById('last-updated').textContent = formatDate(latest.created_at);

  renderCards(getFiltered());
}

loadOpportunities();
</script>
