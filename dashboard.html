<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealerHunters</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="config.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: #F8F9FC;
      color: #1A1F36;
      min-height: 100vh;
    }

    /* ── Header ── */
    .header {
      background: #0F1F35;
      padding: 18px 32px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 2px solid #FF6B35;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 13px;
    }

    .logo-wordmark {
      display: flex;
      flex-direction: column;
      gap: 3px;
    }

    .logo-name {
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      line-height: 1;
    }

    .logo-name .dealer  { color: #ffffff; }
    .logo-name .hunters { color: #FF6B35; }

    .logo-tagline {
      font-size: 11px;
      color: rgba(255,255,255,0.42);
      font-weight: 400;
      letter-spacing: 0.15px;
    }

    .header-meta {
      font-size: 12px;
      color: rgba(255,255,255,0.38);
      font-weight: 400;
    }

    .header-meta strong {
      color: rgba(255,255,255,0.6);
      font-weight: 500;
    }

    /* ── Main ── */
    .main {
      max-width: 900px;
      margin: 0 auto;
      padding: 28px 16px 64px;
    }

    /* ── Stats bar ── */
    .stats-bar {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-radius: 10px;
      padding: 14px 20px;
      margin-bottom: 20px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      color: #6B7280;
    }

    .stats-count {
      font-size: 22px;
      font-weight: 800;
      color: #0F1F35;
    }

    /* ── Card ── */
    .card {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-top-width: 3px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      margin-bottom: 14px;
      padding: 20px 22px 18px;
      transition: box-shadow 0.2s ease;
    }

    .card:hover {
      box-shadow: 0 6px 24px rgba(0,0,0,0.10);
    }

    .card-top {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 10px;
      gap: 12px;
    }

    .card-identity { flex: 1; min-width: 0; }

    .dealer-name {
      font-size: 18px;
      font-weight: 700;
      color: #1A1F36;
      line-height: 1.25;
    }

    .location {
      display: flex;
      align-items: center;
      gap: 4px;
      color: #9CA3AF;
      font-size: 13px;
      margin-top: 5px;
    }

    /* ── Badge ── */
    .badge {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 12px;
      letter-spacing: 0.2px;
    }

    /* ── Summary ── */
    .summary {
      font-size: 14px;
      line-height: 1.65;
      color: #374151;
      margin-bottom: 14px;
    }

    /* ── Pitch box ── */
    .pitch-box {
      border-left: 3px solid #FF6B35;
      background: #FFF8F5;
      padding: 10px 14px;
      border-radius: 0 8px 8px 0;
      margin-bottom: 16px;
    }

    .pitch-label {
      font-size: 11px;
      font-weight: 500;
      color: #9CA3AF;
      margin-bottom: 3px;
    }

    .pitch-text {
      font-size: 13.5px;
      font-weight: 500;
      color: #1A1F36;
      line-height: 1.5;
    }

    /* ── Card footer ── */
    .card-footer {
      display: flex;
      justify-content: flex-end;
    }

    .btn-contact {
      background: transparent;
      color: #6B7280;
      border: 1.5px solid #D1D5DB;
      padding: 7px 16px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      font-family: inherit;
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }

    .btn-contact:hover:not(:disabled) {
      border-color: #6B7280;
      color: #374151;
    }

    .btn-contact.is-contacted {
      background: #16A34A;
      color: #ffffff;
      border-color: #16A34A;
      cursor: default;
    }

    /* ── Empty / error states ── */
    .state-card {
      background: #ffffff;
      border: 1px solid #E8ECF4;
      border-radius: 12px;
      padding: 48px 24px;
      text-align: center;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
      color: #6B7280;
      font-size: 15px;
    }

    .state-card.error { color: #991B1B; }
  </style>
</head>
<body>

<header class="header">
  <div class="header-left">
    <!-- Minimal crosshair / scope icon -->
    <svg width="34" height="34" viewBox="0 0 36 36" fill="none" aria-hidden="true">
      <circle cx="18" cy="18" r="16.5" stroke="#FF6B35" stroke-width="1.25"/>
      <circle cx="18" cy="18" r="9"    stroke="#FF6B35" stroke-width="1.25"/>
      <line x1="18" y1="1"  x2="18" y2="8"  stroke="#FF6B35" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="18" y1="28" x2="18" y2="35" stroke="#FF6B35" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="1"  y1="18" x2="8"  y2="18" stroke="#FF6B35" stroke-width="1.25" stroke-linecap="round"/>
      <line x1="28" y1="18" x2="35" y2="18" stroke="#FF6B35" stroke-width="1.25" stroke-linecap="round"/>
      <circle cx="18" cy="18" r="1.75" fill="#FF6B35"/>
    </svg>

    <div class="logo-wordmark">
      <div class="logo-name">
        <span class="dealer">Dealer</span><span class="hunters">Hunters</span>
      </div>
      <div class="logo-tagline">Intelligent lead signals for automotive advertising</div>
    </div>
  </div>

  <div class="header-meta">Last updated: <strong id="last-updated">—</strong></div>
</header>

<main class="main">
  <div class="stats-bar">
    <span class="stats-count" id="total">—</span>
    <span>active opportunities</span>
  </div>
  <div id="results"></div>
</main>

<script>
const client = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

const SIGNAL_CONFIG = {
  'ownership_change':  { label: 'Ownership Change',  color: '#B42318', bg: '#FEF3F2', border: '#FDA29B' },
  'hiring':            { label: 'Marketing Hire',    color: '#175CD3', bg: '#EFF8FF', border: '#84CAFF' },
  'new_rooftop':       { label: 'New Rooftop',       color: '#027A48', bg: '#ECFDF3', border: '#6CE9A6' },
  'oem_event':         { label: 'OEM Event',         color: '#6941C6', bg: '#F9F5FF', border: '#D6BBFB' },
  // Legacy Title Case (seeded records)
  'Ownership Change':  { label: 'Ownership Change',  color: '#B42318', bg: '#FEF3F2', border: '#FDA29B' },
  'Marketing Hire':    { label: 'Marketing Hire',    color: '#175CD3', bg: '#EFF8FF', border: '#84CAFF' },
  'Leadership Change': { label: 'Leadership Change', color: '#6941C6', bg: '#F9F5FF', border: '#D6BBFB' },
  'Expansion':         { label: 'Expansion',         color: '#027A48', bg: '#ECFDF3', border: '#6CE9A6' },
};

const DEFAULT_SIGNAL = { label: 'Signal', color: '#344054', bg: '#F2F4F7', border: '#D0D5DD' };

const PIN_ICON = `<svg width="10" height="13" viewBox="0 0 12 15" fill="none">
  <path d="M6 0C3.51 0 1.5 2.01 1.5 4.5c0 3.375 4.5 9 4.5 9s4.5-5.625 4.5-9C10.5 2.01 8.49 0 6 0zm0 6.375A1.875 1.875 0 1 1 6 2.625a1.875 1.875 0 0 1 0 3.75z" fill="#9CA3AF"/>
</svg>`;

function scoreGauge(rawScore) {
  const score  = Math.min(Math.max(Number(rawScore) || 0, 0), 100);
  const r      = 19;
  const circ   = +(2 * Math.PI * r).toFixed(2);
  const offset = +(circ * (1 - score / 100)).toFixed(2);
  const stroke = score >= 70 ? '#FF6B35' : score >= 40 ? '#F79009' : '#D0D5DD';

  return `<svg width="54" height="54" viewBox="0 0 54 54" style="flex-shrink:0">
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="#F2F4F7" stroke-width="3.5"/>
    <circle cx="27" cy="27" r="${r}" fill="none" stroke="${stroke}" stroke-width="3.5"
      stroke-dasharray="${circ}" stroke-dashoffset="${offset}"
      stroke-linecap="round" transform="rotate(-90 27 27)"/>
    <text x="27" y="32" text-anchor="middle"
      font-family="Inter,system-ui,sans-serif" font-size="14" font-weight="700"
      fill="#1A1F36">${score}</text>
  </svg>`;
}

function formatDate(iso) {
  if (!iso) return '—';
  return new Date(iso).toLocaleDateString('en-US', {
    month: 'short', day: 'numeric', year: 'numeric'
  });
}

async function markContacted(id, card, btn) {
  btn.textContent = 'Saving…';
  btn.disabled = true;

  const { error } = await client
    .from('opportunities')
    .update({ status: 'contacted' })
    .eq('id', id);

  if (error) {
    console.error('Mark contacted error:', error);
    btn.textContent = 'Mark Contacted';
    btn.disabled = false;
    return;
  }

  card.style.borderTopColor = '#16A34A';
  btn.textContent = '✓ Contacted';
  btn.classList.add('is-contacted');
}

async function loadOpportunities() {
  const results   = document.getElementById('results');
  const totalEl   = document.getElementById('total');
  const updatedEl = document.getElementById('last-updated');

  const { data, error } = await client
    .from('opportunities')
    .select('*')
    .order('confidence_score', { ascending: false });

  if (error) {
    totalEl.textContent = '—';
    results.innerHTML = `<div class="state-card error">
      <strong>Could not load opportunities.</strong><br><br>${error.message}
    </div>`;
    return;
  }

  if (!data || data.length === 0) {
    totalEl.textContent = '0';
    results.innerHTML = `<div class="state-card">
      No opportunities yet. The pipeline populates this automatically each day.
    </div>`;
    return;
  }

  totalEl.textContent = data.length;

  const latest = data.reduce((a, b) =>
    new Date(a.created_at) > new Date(b.created_at) ? a : b, data[0]);
  updatedEl.textContent = formatDate(latest.created_at);

  results.innerHTML = '';

  data.forEach(item => {
    const name      = item.dealership_name || 'Unnamed Dealership';
    const city      = item.city  || '';
    const state     = item.state || '';
    const location  = [city, state].filter(Boolean).join(', ') || 'Location unavailable';
    const rawType   = item.signal_type || item.opportunity_type || '';
    const signal    = SIGNAL_CONFIG[rawType] || DEFAULT_SIGNAL;
    const summary   = item.ai_summary  || 'No summary available.';
    const pitch     = item.pitch_angle || item.recommended_offer || 'No pitch available.';
    const score     = item.confidence_score ?? item.fit_score ?? 0;
    const contacted = item.status === 'contacted';

    const card = document.createElement('div');
    card.className = 'card';
    card.style.borderTopColor = contacted ? '#16A34A' : signal.border;

    card.innerHTML = `
      <div class="card-top">
        <div class="card-identity">
          <div class="dealer-name">${name}</div>
          <div class="location">${PIN_ICON} ${location}</div>
        </div>
        ${scoreGauge(score)}
      </div>

      <span class="badge" style="color:${signal.color}; background:${signal.bg}">
        ${signal.label}
      </span>

      <div class="summary">${summary}</div>

      <div class="pitch-box">
        <div class="pitch-label">Suggested pitch</div>
        <div class="pitch-text">${pitch}</div>
      </div>

      <div class="card-footer">
        <button class="btn-contact${contacted ? ' is-contacted' : ''}"
          data-id="${item.id}" ${contacted ? 'disabled' : ''}>
          ${contacted ? '✓ Contacted' : 'Mark Contacted'}
        </button>
      </div>
    `;

    if (!contacted) {
      card.querySelector('.btn-contact')
        .addEventListener('click', e => markContacted(item.id, card, e.currentTarget));
    }

    results.appendChild(card);
  });
}

loadOpportunities();
</script>

</body>
</html>
