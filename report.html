<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>DealerHunters Intelligence Report</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <style>
    @page { size: letter portrait; margin: 0.65in 0.7in; }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', Arial, sans-serif;
      color: #111827;
      background: #fff;
      font-size: 12px;
      line-height: 1.5;
    }

    /* ── No-print bar ── */
    .no-print {
      position: fixed; top: 0; left: 0; right: 0; z-index: 999;
      background: #111827; color: #fff;
      display: flex; align-items: center; justify-content: space-between;
      padding: 10px 20px;
      font-size: 13px;
    }
    .no-print span { opacity: 0.7; }
    .btn-print {
      background: #10B981; color: #fff; border: none;
      border-radius: 7px; padding: 7px 18px;
      font-size: 13px; font-weight: 600; font-family: inherit;
      cursor: pointer;
    }
    .btn-print:hover { background: #059669; }
    @media print { .no-print { display: none !important; } body { padding-top: 0; } }

    body { padding-top: 48px; }
    @media print { body { padding-top: 0; } }

    /* ── Report header ── */
    .report-header {
      background: #111827;
      color: #fff;
      padding: 22px 28px 20px;
      margin-bottom: 20px;
      border-radius: 8px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      -webkit-print-color-adjust: exact;
      print-color-adjust: exact;
    }
    .report-logo-row {
      display: flex; align-items: center; gap: 11px; margin-bottom: 5px;
    }
    .report-logo-name { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
    .report-logo-name .dealer { color: #fff; }
    .report-logo-name .hunters { color: #10B981; }
    .report-subtitle { font-size: 12px; color: rgba(255,255,255,0.6); margin-top: 2px; }
    .report-meta { text-align: right; font-size: 11px; color: rgba(255,255,255,0.55); }
    .report-meta strong { color: rgba(255,255,255,0.85); display: block; font-size: 13px; margin-bottom: 3px; }

    /* ── Stats bar ── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4, 1fr);
      gap: 10px; margin-bottom: 20px;
    }
    .stat-box {
      border: 1px solid #E5E7EB; border-radius: 8px;
      padding: 12px 14px; text-align: center;
    }
    .stat-box-value { font-size: 22px; font-weight: 800; color: #111827; }
    .stat-box-label { font-size: 10px; font-weight: 600; color: #9CA3AF; text-transform: uppercase; letter-spacing: 0.7px; margin-top: 2px; }

    /* ── Section heading ── */
    .section-heading {
      font-size: 10px; font-weight: 700; color: #9CA3AF;
      letter-spacing: 0.9px; text-transform: uppercase;
      border-bottom: 1.5px solid #10B981;
      padding-bottom: 5px; margin-bottom: 14px; margin-top: 20px;
    }

    /* ── Opportunity card ── */
    .opp-card {
      border: 1px solid #E5E7EB; border-radius: 8px;
      padding: 14px 16px; margin-bottom: 10px;
      page-break-inside: avoid;
      border-left: 4px solid #10B981;
    }
    .opp-card.hot { border-left-color: #F97316; }

    .opp-top {
      display: flex; align-items: flex-start;
      justify-content: space-between; margin-bottom: 8px;
    }
    .opp-name { font-size: 14px; font-weight: 700; color: #111827; }
    .opp-location { font-size: 11px; color: #6B7280; margin-top: 2px; }
    .opp-contact { font-size: 11px; color: #6B7280; margin-top: 2px; }

    .score-chip {
      background: #F0FDF4; border: 1px solid #A7F3D0;
      border-radius: 6px; padding: 4px 10px;
      font-size: 13px; font-weight: 800; color: #065F46;
      flex-shrink: 0; text-align: center; min-width: 48px;
    }
    .score-chip.high { background: #FFF7ED; border-color: #FED7AA; color: #9A3412; }

    .signal-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 9px; border-radius: 999px; margin-bottom: 6px;
      background: #ECFDF5; color: #065F46;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .campaign-badge {
      display: inline-block; font-size: 10px; font-weight: 500;
      padding: 2px 9px; border-radius: 999px; margin-left: 5px;
      background: #1F2937; color: #E5E7EB;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .hot-badge {
      display: inline-block; font-size: 10px; font-weight: 600;
      padding: 2px 8px; border-radius: 999px; margin-left: 5px;
      background: #FFF7ED; color: #C2410C;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }

    .opp-section-label {
      font-size: 9px; font-weight: 700; color: #9CA3AF;
      text-transform: uppercase; letter-spacing: 0.7px;
      margin-bottom: 2px; margin-top: 8px;
    }
    .opp-text { font-size: 11px; color: #374151; line-height: 1.5; }

    .opp-pitch {
      background: #F9FAFB; border-left: 3px solid #10B981;
      border-radius: 0 5px 5px 0;
      padding: 8px 10px; margin-top: 8px;
      -webkit-print-color-adjust: exact; print-color-adjust: exact;
    }
    .opp-pitch .opp-section-label { margin-top: 0; }

    /* ── Footer ── */
    .report-footer {
      margin-top: 28px; padding-top: 12px;
      border-top: 1px solid #E5E7EB;
      display: flex; align-items: center; justify-content: space-between;
    }
    .footer-brand { font-size: 11px; font-weight: 700; color: #374151; }
    .footer-brand .hunters { color: #10B981; }
    .footer-powered { font-size: 10px; color: #9CA3AF; }

    /* ── Page numbers ── */
    @media print {
      @page { @bottom-center { content: "Page " counter(page) " of " counter(pages); font-family: Inter, Arial, sans-serif; font-size: 9px; color: #9CA3AF; } }
    }

    .empty-state { text-align: center; padding: 40px 20px; color: #6B7280; font-size: 14px; }
  </style>
</head>
<body>

<!-- Print toolbar (screen only) -->
<div class="no-print">
  <span>DealerHunters Intelligence Report — Preview</span>
  <button class="btn-print" onclick="window.print()">🖨 Print / Save PDF</button>
</div>

<div id="report-root"></div>

<script>
const CAMPAIGN_MAP = {
  'ownership_change':  '🔄 Vendor Transition Campaign',
  'Ownership Change':  '🔄 Vendor Transition Campaign',
  'new_rooftop':       '🏗 Grand Opening Package',
  'New Rooftop':       '🏗 Grand Opening Package',
  'weak_digital':      '📱 Digital Rescue Package',
  'Weak Digital':      '📱 Digital Rescue Package',
  'hiring':            '👥 BDC Launch Campaign',
  'Marketing Hire':    '👥 BDC Launch Campaign',
  'oem_event':         '🏷 Factory Event Campaign',
  'OEM Event':         '🏷 Factory Event Campaign',
  'leadership_change': '🤝 New Leadership Outreach',
  'Leadership Change': '🤝 New Leadership Outreach',
};

const SIGNAL_LABELS = {
  'ownership_change':  'Ownership Change',
  'hiring':            'Marketing Hire',
  'new_rooftop':       'New Rooftop',
  'oem_event':         'OEM Event',
  'weak_digital':      'Weak Digital',
  'leadership_change': 'Leadership Change',
  'expansion':         'Expansion',
};

function esc(s) {
  return String(s || '')
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

function renderReport() {
  const data  = JSON.parse(localStorage.getItem('dh_report_data')  || '[]');
  const stats = JSON.parse(localStorage.getItem('dh_report_stats') || '{}');
  const root  = document.getElementById('report-root');

  if (!data.length) {
    root.innerHTML = '<div class="empty-state">No report data found. Please generate the report from the DealerHunters dashboard.</div>';
    return;
  }

  const hotCount   = data.filter(d => d.is_hot_lead).length;
  const filterLabel = stats.filter && stats.filter !== 'All' ? ` — ${stats.filter}` : '';

  let html = `
    <div class="report-header">
      <div>
        <div class="report-logo-row">
          <svg width="36" height="36" viewBox="0 0 40 40" fill="none">
            <circle cx="20" cy="20" r="18" stroke="#10B981" stroke-width="1.5"/>
            <line x1="20" y1="1"  x2="20" y2="9"  stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="20" y1="31" x2="20" y2="39" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="1"  y1="20" x2="9"  y2="20" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
            <line x1="31" y1="20" x2="39" y2="20" stroke="#10B981" stroke-width="1.5" stroke-linecap="round"/>
            <circle cx="20" cy="20" r="2" fill="#10B981"/>
            <rect x="5" y="21" width="30" height="8" rx="1.5" stroke="#10B981" stroke-width="1.5"/>
            <path d="M9 21 L13 13 H27 L32 21" stroke="#10B981" stroke-width="1.5" stroke-linejoin="round" stroke-linecap="round"/>
            <circle cx="12.5" cy="29" r="4" stroke="#10B981" stroke-width="1.5"/>
            <circle cx="27.5" cy="29" r="4" stroke="#10B981" stroke-width="1.5"/>
          </svg>
          <div class="report-logo-name"><span class="dealer">Dealer</span><span class="hunters">Hunters</span></div>
        </div>
        <div class="report-subtitle">Intelligence Report${filterLabel} · Prepared for CR Advertising</div>
      </div>
      <div class="report-meta">
        <strong>${esc(stats.date || new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' }))}</strong>
        Confidential · Do not distribute
      </div>
    </div>

    <div class="stats-bar">
      <div class="stat-box">
        <div class="stat-box-value">${data.length}</div>
        <div class="stat-box-label">Opportunities</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value">${stats.ownership ?? 0}</div>
        <div class="stat-box-label">Ownership Changes</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value">${stats.avgScore ?? 0}</div>
        <div class="stat-box-label">Avg Score</div>
      </div>
      <div class="stat-box">
        <div class="stat-box-value">${hotCount}</div>
        <div class="stat-box-label">Hot Leads 🔥</div>
      </div>
    </div>

    <div class="section-heading">Opportunities (${data.length})</div>
  `;

  html += data.map(item => {
    const sigType  = item.signal_type || item.opportunity_type || '';
    const sigLabel = SIGNAL_LABELS[sigType] || sigType || 'Signal';
    const campaign = CAMPAIGN_MAP[sigType] || '';
    const score    = Number(item.confidence_score ?? item.fit_score ?? 0);
    const name     = item.dealership_name || item.opportunity_name || 'Unknown';
    const loc      = [item.city, item.state].filter(Boolean).join(', ');
    const summary  = item.ai_summary || item.raw_summary || '';
    const pitch    = item.suggested_pitch || item.pitch || '';
    const phone    = item.phone || '';
    const website  = item.website ? item.website.replace(/^https?:\/\/(www\.)?/, '').replace(/\/$/, '') : '';
    const isHot    = item.is_hot_lead;

    return `
      <div class="opp-card${isHot ? ' hot' : ''}">
        <div class="opp-top">
          <div>
            <div class="opp-name">${esc(name)}</div>
            ${loc ? `<div class="opp-location">📍 ${esc(loc)}</div>` : ''}
            ${phone ? `<div class="opp-contact">📞 ${esc(phone)}</div>` : ''}
            ${website ? `<div class="opp-contact">🌐 ${esc(website)}</div>` : ''}
          </div>
          <div class="score-chip${score >= 80 ? ' high' : ''}">${score}</div>
        </div>
        <div>
          <span class="signal-badge">${esc(sigLabel)}</span>
          ${campaign ? `<span class="campaign-badge">${esc(campaign)}</span>` : ''}
          ${isHot ? `<span class="hot-badge">🔥 Hot Lead</span>` : ''}
        </div>
        ${summary ? `<div class="opp-section-label">AI Summary</div><div class="opp-text">${esc(summary)}</div>` : ''}
        ${pitch ? `<div class="opp-pitch"><div class="opp-section-label">Suggested Pitch</div><div class="opp-text">${esc(pitch)}</div></div>` : ''}
      </div>
    `;
  }).join('');

  html += `
    <div class="report-footer">
      <div class="footer-brand">Dealer<span class="hunters">Hunters</span> Intelligence Platform</div>
      <div class="footer-powered">Powered by True Measure Advisors, LLC</div>
    </div>
  `;

  root.innerHTML = html;
}

renderReport();
window.addEventListener('load', () => {
  setTimeout(() => window.print(), 600);
});
</script>

</body>
</html>
